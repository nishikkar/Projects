<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Products</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style> 
    .header {
      text-align: center;
      padding: 20px;
      background-color: #0078d7;
      color: white;
      border-radius: 8px;
    }
  </style>
</head>
<body>  
  <header class="main-header">
    <div class="logo">[MSME Logo]</div>
    <nav>
        <ul class="nav-links">
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('customer_dashboard') }}">Customer Dashboard</a></li>
        <li><a href="{{ url_for('order') }}">Order</a></li>
        </ul>
    </nav>
    <div>
        <a href="{{ url_for('logout') }}" class="btn-primary">Log Out</a>
    
    </div>
</header>
  <div class="header">
    <h1>Order Your Products</h1>
    <input 
    type="text" 
    id="search-bar" 
    placeholder="Search products..." 
    oninput="filterProducts()">
  </div>
  <main>
    <section class="order-section">
      <form class="order-form" action="/order" method="POST">
        <div class="product-container" id="product-container">
          <!-- Example Product Cards -->
           {% for i in items %}
          <div class="product-card" data-name="{{i['name']}}">
            <img src="{{i['name']}}.jpg" alt="{{i['name']}}">
              <h3 name="product{{i['id']}}-name">{{i["name"]}}</h3>
              <label for="product{{i['id']}}-quantity">Quantity:</label>
              <input type="number" id="product{{i['id']}}-quantity" name="product{{i['id']}}-quantity" min="0" placeholder="Enter quantity">
              <select name="product{{i['id']}}-unit" id="product{{i['id']}}-unit">
                <option value="kg">Kg</option>
                <option value="pieces">Pieces</option>
              </select>
          </div>
          {% endfor %}
    
        </div>
    

      
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        <label for="phone">Contact No.:</label>
        <input type="text" id="phone" name="phone" placeholder="Enter your phone no." required>
        <label for="address">Delivery Address:</label>
        <input type="text" id="address" name="address" placeholder="Enter your delivery address" required>
        <label for="delivery_date">Delivery Date:</label>
        <input type="text" id="delivery_date" name="delivery_date" placeholder="Enter a tentative delivery date" >
        <button type="submit" class="btn-primary">Place Order</button>
    </form>
  </section>
  </main>

  <footer class="main-footer">
    <p>© 2024 [MSME Name]. All rights reserved.</p>
  </footer>

  <script src="/static/script.js"></script>
</body>
</html>
